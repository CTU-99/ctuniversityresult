<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CT University Result Portal</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#003366;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    background:#003366;
    color:white;
}

.pass{
    color:green;
    font-weight:bold;
}

.fail{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>CT University Result Portal</h1>

<input type="text" id="regno" placeholder="Enter Registration Number">

<select id="session">
<option value="June26">June26</option>
</select>

<button onclick="searchResult()">Search Result</button>

<div id="output"></div>

</div>

<script>

const API_URL ="https://script.google.com/macros/s/AKfycbxEC6fTGwgYEoDI_BWdSlyNhFfkBbon2WkzUQH-3FlUMsaa6GOrtBBF7KCSAgTR6W_0/exec";

async function searchResult(){

    let regno = document.getElementById("regno").value;
    let session = document.getElementById("session").value;

    let response = await fetch(API_URL + "?regno=" + regno + "&session=" + session);

    let data = await response.json();

    let html = "";

    if(data.length===0){
        html="<h3 style='color:red'>No Result Found</h3>";
    }else{

        html += "<h2>Student Details</h2>";

        html += "<p><b>Name:</b> "+data[0].name+"</p>";
        html += "<p><b>Registration No:</b> "+data[0].regno+"</p>";
        html += "<p><b>Course:</b> "+data[0].course+"</p>";
        html += "<p><b>Semester:</b> "+data[0].sem+"</p>";

        html += "<table>";
        html += "<tr><th>Subject Code</th><th>Subject</th><th>Credit</th><th>Grade</th><th>Grade Point</th><th>Remarks</th></tr>";

        data.forEach(row=>{

            let cls=(row.grade=="F")?"fail":"pass";

            html += `
            <tr>
                <td>${row.subcode}</td>
                <td>${row.subject}</td>
                <td>${row.credit}</td>
                <td class="${cls}">${row.grade}</td>
                <td>${row.gradept}</td>
                <td>${row.remarks}</td>
            </tr>`;
        });

        html += "</table>";
    }

    document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
